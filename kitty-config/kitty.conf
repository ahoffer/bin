tab_bar_edge top

# Use xterm-256color for better compatibility with .bashrc color detection
term xterm-256color

# Start a login shell so .profile sources .bashrc
shell /opt/homebrew/bin/bash --login

allow_remote_control yes
shell_integration no-title

kitty_mod ctrl+shift

# Rectangle (block) select with Ctrl+Shift+Left click
mouse_map ctrl+shift+left press ungrabbed mouse_selection rectangle

map alt+e launch --type=overlay ~/bin/kitty-set-window-title @active-kitty-window-id
map alt+w launch --type=overlay ~/bin/kitty-set-window-title @active-kitty-window-id

# Show all keybindings in formatted, categorized view
map kitty_mod+k launch --type=overlay ~/bin/kitty-show-keybindings

# GNOME-style new window
map ctrl+shift+n new_os_window

# Treat Option as Alt so map alt+... bindings work
macos_option_as_alt yes

# Keep shell word motion on Alt+arrows across platforms.
# Reserve Ctrl+Shift+Left/Right for kitty tab switching on both macOS and Linux.
map alt+left send_text all \x1bb
map alt+right send_text all \x1bf
map ctrl+shift+left previous_tab
map ctrl+shift+right next_tab

# Backspace uses kitty default 0x7f. Readline handles both ^H and ^?.
# No send_text mapping needed, removing it fixes kitten overlay input.

# Ctrl+Backspace sends Esc+DEL for readline backward-kill-word.
# Mode limited to normal,application so kitten overlays handle it natively.
map ctrl+backspace send_text normal,application \x1b\x7f

# Home and End send Ctrl-A and Ctrl-E for readline line navigation.
# Mode limited to normal,application so kitten overlays handle them natively.
map home send_text normal,application \x01
map end send_text normal,application \x05

# Smart paste: transfers clipboard images to bigfish, falls back to text paste
map kitty_mod+v launch --type=background --allow-remote-control ~/bin/kittypaste

# Machine-specific overrides (font_size, OS-specific mappings)
include platform.conf
